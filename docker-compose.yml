version: "3.8"

services:
  backend:
    build: 
      context: ./backend
    container_name: biztelai_backend
    ports:
      - "8000:8080"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/biztelai.db:/app/biztelai.db
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_BACKEND_URL=/api
    container_name: biztelai_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
